<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homeserver</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --border: #1e1e2e;
      --text: #e0e0f0;
      --muted: #4a4a6a;
      --green: #00ff88;
      --red: #ff3355;
      --green-dim: rgba(0, 255, 136, 0.08);
      --red-dim: rgba(255, 51, 85, 0.08);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,255,136,0.04) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(255,51,85,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .grid-bg {
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      pointer-events: none;
    }

    .container {
      position: relative;
      width: 100%;
      max-width: 480px;
      z-index: 1;
    }

    .header {
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    h1 span {
      color: var(--green);
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 1rem;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .btn {
      position: relative;
      width: 100%;
      padding: 1.5rem 2rem;
      border: 1px solid;
      background: transparent;
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .btn:hover::before { opacity: 1; }
    .btn:active { transform: scale(0.99); }

    .btn-start {
      border-color: var(--green);
      color: var(--green);
    }
    .btn-start::before { background: var(--green-dim); }
    .btn-start:hover { box-shadow: 0 0 30px rgba(0,255,136,0.1), inset 0 0 30px rgba(0,255,136,0.03); }

    .btn-stop {
      border-color: var(--red);
      color: var(--red);
    }
    .btn-stop::before { background: var(--red-dim); }
    .btn-stop:hover { box-shadow: 0 0 30px rgba(255,51,85,0.1), inset 0 0 30px rgba(255,51,85,0.03); }

    .btn-icon {
      font-size: 1.1rem;
      transition: transform 0.2s ease;
    }
    .btn:hover .btn-icon { transform: translateX(4px); }

    .btn.loading {
      opacity: 0.6;
      pointer-events: none;
    }

    .btn.loading .btn-text::after {
      content: '...';
      animation: dots 1s infinite;
    }

    .log {
      margin-top: 2rem;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 1rem 1.2rem;
      font-size: 0.7rem;
      color: var(--muted);
      min-height: 60px;
      animation: fadeUp 0.6s 0.4s ease both;
      line-height: 1.8;
    }

    .log-entry {
      display: flex;
      gap: 1rem;
      animation: fadeIn 0.3s ease;
    }

    .log-time { color: var(--muted); flex-shrink: 0; }
    .log-msg.ok { color: var(--green); }
    .log-msg.err { color: var(--red); }
    .log-msg.info { color: var(--text); }

    .footer {
      margin-top: 2rem;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-align: center;
      animation: fadeUp 0.6s 0.5s ease both;
    }

    @keyframes fadeDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: none; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes dots { 0%,100% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="container">
    <div class="header">
      <div class="label">System Control</div>
      <h1>Home<span>Server</span></h1>
      <div class="status-bar">
        <div class="status-dot"></div>
        <span>CachyOS · Ryzen 5 5600G · 16GB</span>
      </div>
    </div>

    <div class="buttons">
      <button class="btn btn-start" onclick="sendSignal('start', this)">
        <span class="btn-text">Server starten</span>
        <span class="btn-icon">→</span>
      </button>
      <button class="btn btn-stop" onclick="sendSignal('shutdown', this)">
        <span class="btn-text">Server stoppen</span>
        <span class="btn-icon">→</span>
      </button>
    </div>

    <div class="log" id="log">
      <div class="log-entry">
        <span class="log-time">--:--:--</span>
        <span class="log-msg info">Bereit.</span>
      </div>
    </div>

    <div class="footer">HOMESERVER · PRIVAT · NICHT WEITERGEBEN</div>
  </div>

  <script>
    const TOPIC = 'WoL-homeserver-CachyLTS-DXBCF9';

    function now() {
      return new Date().toLocaleTimeString('de-DE');
    }

    function addLog(msg, type = 'info') {
      const log = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">${now()}</span><span class="log-msg ${type}">${msg}</span>`;
      log.appendChild(entry);
      log.scrollTop = log.scrollHeight;
    }

    async function sendSignal(action, btn) {
      btn.classList.add('loading');
      const label = action === 'start' ? 'START' : 'SHUTDOWN';
      addLog(`Sende ${label} Signal...`, 'info');

      try {
        await fetch(`https://ntfy.sh/${TOPIC}`, {
          method: 'POST',
          headers: { 'Title': action },
          body: action
        });
        addLog(`Signal gesendet: ${label}`, 'ok');
        if (action === 'start') addLog('Server startet in ~40 Sekunden.', 'ok');
        if (action === 'shutdown') addLog('Server fährt herunter...', 'ok');
      } catch (e) {
        addLog('Fehler: Keine Verbindung zu ntfy.sh', 'err');
      } finally {
        btn.classList.remove('loading');
      }
    }
  </script>
</body>
</html>
